<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Admin — Review Suggestions</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 24px;
        }
        /* Auth gate */
        #auth-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 16px;
        }
        #auth-gate h2 { color: #4ade80; font-size: 1.3rem; }
        #auth-gate input {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 16px;
            color: #e0e0e0;
            font-size: 1rem;
            width: 280px;
            text-align: center;
        }
        #auth-gate input:focus { outline: none; border-color: #4ade80; }
        #auth-gate button {
            padding: 10px 32px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        #auth-gate .error-msg { color: #f87171; font-size: 0.85rem; display: none; }
        #app-content { display: none; }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #4ade80;
        }
        .subtitle {
            color: #888;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 20px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4ade80;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card.enriched .number { color: #60a5fa; }
        .stat-card.approved .number { color: #a78bfa; }
        .stat-card.rejected .number { color: #f87171; }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #ccc;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: #4ade80; color: #4ade80; }
        .filter-btn.active { background: #4ade80; color: #000; border-color: #4ade80; font-weight: 600; }

        .suggestion-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .suggestion-card:hover { border-color: #555; }
        .suggestion-card.status-enriched { border-left: 3px solid #60a5fa; }
        .suggestion-card.status-pending { border-left: 3px solid #fbbf24; }
        .suggestion-card.status-approved { border-left: 3px solid #4ade80; }
        .suggestion-card.status-rejected { border-left: 3px solid #f87171; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .card-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-pending { background: #fbbf2433; color: #fbbf24; }
        .badge-enriched { background: #60a5fa33; color: #60a5fa; }
        .badge-approved { background: #4ade8033; color: #4ade80; }
        .badge-rejected { background: #f8717133; color: #f87171; }
        .badge-source { background: #333; color: #aaa; }

        .card-url {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .card-url:hover { text-decoration: underline; }

        .card-date {
            color: #666;
            font-size: 0.8rem;
        }

        .enriched-preview {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
        }
        .enriched-preview h3 {
            color: #4ade80;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .enriched-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .enriched-field label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .enriched-field input,
        .enriched-field textarea,
        .enriched-field select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 10px;
            color: #e0e0e0;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .enriched-field textarea { resize: vertical; min-height: 60px; }
        .enriched-field input:focus,
        .enriched-field textarea:focus {
            outline: none;
            border-color: #4ade80;
        }
        .enriched-field.full-width { grid-column: 1 / -1; }

        .tag-select {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .tag-chip {
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tag-chip:hover { border-color: #4ade80; }
        .tag-chip.selected { background: #4ade8033; color: #4ade80; border-color: #4ade80; }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-approve { background: #4ade80; color: #000; }
        .btn-approve:hover { background: #22c55e; }
        .btn-reject { background: #333; color: #f87171; border: 1px solid #f8717144; }
        .btn-reject:hover { background: #f8717122; }
        .btn-duplicate { background: #333; color: #fbbf24; border: 1px solid #fbbf2444; }
        .btn-duplicate:hover { background: #fbbf2422; }
        .btn-enrich { background: #60a5fa33; color: #60a5fa; border: 1px solid #60a5fa44; }
        .btn-enrich:hover { background: #60a5fa44; }
        .btn-save { background: #333; color: #ccc; }
        .btn-save:hover { background: #444; }
        .btn-geocode { background: #2a9d8f33; color: #2a9d8f; border: 1px solid #2a9d8f44; padding: 6px 14px; font-size: 0.8rem; }
        .btn-geocode:hover { background: #2a9d8f44; }
        .btn-visit { background: #333; color: #60a5fa; border: 1px solid #60a5fa44; padding: 6px 14px; font-size: 0.8rem; text-decoration: none; display: inline-block; }
        .btn-visit:hover { background: #60a5fa22; }
        .geocode-status { font-size: 0.75rem; color: #888; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 8px;
            background: #4ade80;
            color: #000;
            font-weight: 600;
            font-size: 0.9rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #f87171; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #666; }

        .not-event-warning {
            background: #fbbf2411;
            border: 1px solid #fbbf2433;
            border-radius: 6px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 0.8rem;
            color: #fbbf24;
        }
        .dupe-warning {
            background: #f8717111;
            border: 1px solid #f8717133;
            border-radius: 6px;
            padding: 10px 12px;
            margin: 8px 0;
            font-size: 0.8rem;
            color: #f87171;
        }
        .dupe-header {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .dupe-warning strong {
            color: #e0e0e0;
            font-size: 0.85rem;
        }
        .btn-compare { background: #f59e0b33; color: #f59e0b; border: 1px solid #f59e0b44; padding: 4px 10px; font-size: 0.75rem; margin-left: 8px; }
        .btn-compare:hover { background: #f59e0b44; }
        .badge-merged { background: #f59e0b33; color: #f59e0b; }
        .stat-card.merged .number { color: #f59e0b; }
        .suggestion-card.status-merged { border-left: 3px solid #f59e0b; }

        /* Tab bar */
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        .tab-btn {
            padding: 10px 24px;
            background: none;
            border: none;
            color: #888;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #ccc; }
        .tab-btn.active { color: #4ade80; border-bottom-color: #4ade80; }

        /* Events tab */
        .events-search {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .events-search input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 14px;
            color: #e0e0e0;
            font-size: 0.9rem;
        }
        .events-search input:focus { outline: none; border-color: #4ade80; }
        .event-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .event-card:hover { border-color: #555; }
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .event-header h3 { color: #e0e0e0; font-size: 1rem; margin: 0; }
        .event-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            font-size: 0.85rem;
            color: #aaa;
        }
        .event-detail label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .event-detail input,
        .event-detail textarea {
            width: 100%;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 6px 10px;
            color: #e0e0e0;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .event-detail textarea { resize: vertical; min-height: 50px; }
        .event-detail input:focus,
        .event-detail textarea:focus { outline: none; border-color: #4ade80; }
        .event-detail.full-width { grid-column: 1 / -1; }
        .event-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            align-items: center;
        }
        .btn-delete { background: #333; color: #f87171; border: 1px solid #f8717144; }
        .btn-delete:hover { background: #f8717122; }
        .event-count {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        /* Tag filter bar */
        .tag-filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 12px;
            align-items: center;
        }
        .tag-filter-bar .label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 4px;
        }
        .tag-filter-chip {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            background: #222;
            color: #888;
            border: 1px solid #333;
            transition: all 0.15s;
        }
        .tag-filter-chip.active {
            background: #4ade8022;
            color: #4ade80;
            border-color: #4ade8066;
        }
        .tag-filter-chip:hover { border-color: #555; }
        /* Bulk operations */
        .bulk-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .bulk-bar .label { font-size: 0.8rem; color: #aaa; }
        .bulk-bar select, .bulk-bar input {
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 4px 8px;
            color: #e0e0e0;
            font-size: 0.8rem;
        }
        .bulk-bar button {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }
        .bulk-bar .btn-apply { background: #4ade8033; color: #4ade80; }
        .bulk-bar .btn-remove { background: #f8717122; color: #f87171; }
        .event-card .bulk-check {
            margin-right: 8px;
            accent-color: #4ade80;
        }
        /* Tag management modal */
        .tag-mgmt-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .tag-mgmt-modal.show { display: flex; }
        .tag-mgmt-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .tag-mgmt-content h3 { color: #e0e0e0; margin: 0 0 16px; }
        .tag-mgmt-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }
        .tag-mgmt-row input, .tag-mgmt-row select {
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 10px;
            color: #e0e0e0;
            font-size: 0.85rem;
            flex: 1;
        }
        .tag-mgmt-row button {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            background: #4ade8033;
            color: #4ade80;
        }
        .tag-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
            background: #222;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
        }
        .icon-picker-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
            padding: 8px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .icon-picker-grid span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.1s;
        }
        .icon-picker-grid span:hover { background: #333; }

        /* Custom tag input */
        .custom-tag-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }
        .custom-tag-row input {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 4px 10px;
            color: #e0e0e0;
            font-size: 0.8rem;
            width: 160px;
        }
        .custom-tag-row input:focus { outline: none; border-color: #4ade80; }
        .btn-add-tag {
            padding: 4px 12px;
            background: #333;
            color: #4ade80;
            border: 1px solid #4ade8044;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .btn-add-tag:hover { background: #4ade8022; }

        /* Compare & Update modal */
        .merge-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .merge-modal {
            background: #1a1a1a; border: 1px solid #444; border-radius: 12px;
            padding: 24px; max-width: 720px; width: 100%; max-height: 85vh;
            overflow-y: auto;
        }
        .merge-modal h3 { color: #f59e0b; margin-bottom: 16px; font-size: 1.1rem; }
        .merge-row {
            display: grid; grid-template-columns: 100px 1fr 1fr;
            gap: 8px; margin-bottom: 10px; align-items: start;
        }
        .merge-label {
            font-size: 0.75rem; color: #888; text-transform: uppercase;
            letter-spacing: 0.5px; padding-top: 8px;
        }
        .merge-option {
            padding: 8px 12px; border-radius: 6px; border: 2px solid #333;
            background: #111; font-size: 0.85rem; color: #ccc;
            cursor: pointer; transition: all 0.15s; min-height: 36px;
            word-break: break-word;
        }
        .merge-option:hover { border-color: #666; }
        .merge-option.selected { border-color: #4ade80; background: #4ade8011; color: #e0e0e0; }
        .merge-option.same { border-color: #333; color: #555; cursor: default; font-style: italic; }
        .merge-option .source-tag {
            font-size: 0.65rem; color: #666; text-transform: uppercase;
            display: block; margin-bottom: 2px;
        }
        .merge-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
        .btn-merge { background: #f59e0b; color: #000; font-weight: 600; }
        .btn-merge:hover { background: #d97706; }
        .btn-cancel { background: #333; color: #ccc; }
        .btn-cancel:hover { background: #444; }
    </style>
</head>
<body>
    <!-- Auth Gate -->
    <div id="auth-gate">
        <h2>Events Admin</h2>
        <p style="color:#888;font-size:0.85rem;">Sign in to continue</p>
        <input type="email" id="auth-email" placeholder="Email" onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
        <input type="password" id="auth-password" placeholder="Password" onkeydown="if(event.key==='Enter')checkAuth()">
        <button onclick="checkAuth()">Sign In</button>
        <p class="error-msg" id="auth-error">Invalid email or password</p>
    </div>

    <!-- Main App (hidden until authed) -->
    <div id="app-content">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h1>Events Admin</h1>
            <button onclick="signOut()" style="padding:6px 16px;background:#333;color:#ccc;border:1px solid #555;border-radius:8px;cursor:pointer;font-size:0.8rem;">Sign Out</button>
        </div>
        <p class="subtitle">Review and approve suggested events for the Regen Events Map</p>

        <div class="stats" id="stats"></div>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('suggestions')" id="tab-suggestions">Suggestions</button>
            <button class="tab-btn" onclick="switchTab('events')" id="tab-events">Events</button>
        </div>
        <div id="suggestions-tab">
            <div class="filter-bar" id="filters"></div>
            <div id="suggestions-list"></div>
        </div>
        <div id="events-tab" style="display:none;">
            <div class="events-search">
                <input type="text" id="events-search" placeholder="Search events by name, location, or tag..." oninput="renderEventsTab()">
                <button onclick="openTagManager()" style="background:#333;color:#aaa;border:1px solid #444;border-radius:8px;padding:8px 14px;font-size:0.8rem;cursor:pointer;white-space:nowrap;">Manage Tags</button>
            </div>
            <div id="tag-filter-bar" class="tag-filter-bar"></div>
            <div class="bulk-bar" id="bulk-bar" style="display:none;">
                <span class="label"><span id="bulk-count">0</span> selected</span>
                <select id="bulk-tag-select"></select>
                <button class="btn-apply" onclick="bulkAddTag()">+ Add Tag</button>
                <button class="btn-remove" onclick="bulkRemoveTag()">- Remove Tag</button>
                <button style="background:#333;color:#aaa;" onclick="clearBulkSelection()">Clear</button>
            </div>
            <div class="event-count" id="event-count"></div>
            <div id="events-list"></div>
        </div>

        <!-- Tag management modal -->
        <div class="tag-mgmt-modal" id="tag-mgmt-modal" onclick="if(event.target===this)closeTagManager()">
            <div class="tag-mgmt-content">
                <h3>Tag Manager</h3>
                <div style="margin-bottom:16px;">
                    <label style="font-size:0.75rem;color:#666;text-transform:uppercase;">Rename Tag</label>
                    <div class="tag-mgmt-row">
                        <select id="rename-tag-from"><option value="">Select tag...</option></select>
                        <span style="color:#666;">-></span>
                        <input type="text" id="rename-tag-to" placeholder="New name...">
                        <button onclick="renameTag()">Rename</button>
                    </div>
                </div>
                <div style="margin-bottom:16px;">
                    <label style="font-size:0.75rem;color:#666;text-transform:uppercase;">Delete Tag from All Events</label>
                    <div class="tag-mgmt-row">
                        <select id="delete-tag-select"><option value="">Select tag...</option></select>
                        <button onclick="deleteTagGlobally()" style="background:#f8717122;color:#f87171;">Delete</button>
                    </div>
                </div>
                <div>
                    <label style="font-size:0.75rem;color:#666;text-transform:uppercase;">Tag Icons</label>
                    <div id="tag-icon-list"></div>
                </div>
                <div style="margin-top:16px;text-align:right;">
                    <button onclick="closeTagManager()" style="background:#333;color:#aaa;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;">Close</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ── Auth (Supabase email/password) ──
        async function checkAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            errEl.style.display = 'none';

            if (!email || !password) {
                errEl.textContent = 'Please enter email and password';
                errEl.style.display = 'block';
                return;
            }

            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                errEl.textContent = error.message;
                errEl.style.display = 'block';
                document.getElementById('auth-password').value = '';
                document.getElementById('auth-password').focus();
            } else {
                showApp();
            }
        }

        function showApp() {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            loadSuggestions();
        }

        async function signOut() {
            await sb.auth.signOut();
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('auth-gate').style.display = 'flex';
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-password').value = '';
        }

        const SUPABASE_URL = 'https://aurftdjjghtzeofqzezx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1cmZ0ZGpqZ2h0emVvZnF6ZXp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4MzUsImV4cCI6MjA4OTU2NjgzNX0.PeOisRNczOCYOgyiKL8lNDA0ZNiwhzBhqQWDYx6DtMo';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DEFAULT_TAGS = [
            'regen','bioregional','ecovillage','permaculture','commons','climate',
            'systems change','governance','web3','transformation','festival',
            'gathering','retreat','impact','futures','regen ag','regen economics',
            'healing','wellbeing','craft','primitive skills','rewilding',
            'cultural','food systems','entrepreneurship','hacker camp','burning man','UPgame',
            'music','yoga','dance','herbalism','tantra'
        ];
        let ALL_TAGS = [...DEFAULT_TAGS].sort();

        function rebuildAllTags(eventsList) {
            const tagSet = new Set(DEFAULT_TAGS);
            (eventsList || []).forEach(ev => {
                (ev.tags || []).forEach(t => tagSet.add(t));
            });
            ALL_TAGS = Array.from(tagSet).sort();
        }

        const MONTHS = ['Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        let suggestions = [];
        let existingEvents = [];
        let currentFilter = 'all';

        // ── Toast ──
        function toast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => el.className = 'toast', 3000);
        }

        // ── Load suggestions + existing events ──
        async function loadSuggestions() {
            const [sugResult, evResult] = await Promise.all([
                sb.from('suggestions').select('*').order('created_at', { ascending: false }),
                sb.from('events').select('id,name,dates,month,location,tags')
            ]);
            if (sugResult.error) { toast('Error loading suggestions: ' + sugResult.error.message, true); return; }
            if (evResult.error) { toast('Error loading events: ' + evResult.error.message, true); return; }
            suggestions = sugResult.data;
            existingEvents = evResult.data || [];
            rebuildAllTags(existingEvents);
            document.getElementById('tab-events').textContent = `Events (${existingEvents.length})`;
            renderStats();
            renderFilters();
            renderList();
        }

        // ── Duplicate detection ──
        function normalizeForMatch(str) {
            return (str || '').toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getKeywords(str) {
            const stopWords = new Set(['the','a','an','of','for','and','in','at','to','by','on','is','it','with','from','as','or','be','are','was','this','that','2026','2025']);
            return normalizeForMatch(str)
                .split(' ')
                .filter(w => w.length > 2 && !stopWords.has(w));
        }

        function findDuplicates(suggestionName) {
            if (!suggestionName) return [];
            const sugKeywords = getKeywords(suggestionName);
            if (sugKeywords.length === 0) return [];

            const matches = [];
            existingEvents.forEach(ev => {
                const evKeywords = getKeywords(ev.name);
                if (evKeywords.length === 0) return;

                // Count shared keywords
                const shared = sugKeywords.filter(k => evKeywords.some(ek => ek.includes(k) || k.includes(ek)));
                const score = shared.length / Math.min(sugKeywords.length, evKeywords.length);

                // Also check if one name contains the other (substring match)
                const normSug = normalizeForMatch(suggestionName);
                const normEv = normalizeForMatch(ev.name);
                const isSubstring = normSug.includes(normEv) || normEv.includes(normSug);

                // Require either: substring match, or 2+ shared keywords with high score
                const commonWords = new Set(['festival','gathering','conference','summit','week','camp','retreat','congress','convergence','day','days']);
                const meaningfulShared = shared.filter(w => !commonWords.has(w));
                const isGoodMatch = (score >= 0.6 && shared.length >= 2 && meaningfulShared.length >= 1) || isSubstring;

                if (isGoodMatch) {
                    matches.push({ event: ev, score, shared, isSubstring });
                }
            });

            return matches.sort((a, b) => b.score - a.score);
        }

        // ── Stats ──
        function renderStats() {
            const counts = { pending: 0, enriched: 0, approved: 0, rejected: 0 };
            suggestions.forEach(s => { if (counts[s.status] !== undefined) counts[s.status]++; });
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="number">${suggestions.length}</div><div class="label">Total</div></div>
                <div class="stat-card"><div class="number">${counts.pending}</div><div class="label">Pending</div></div>
                <div class="stat-card enriched"><div class="number">${counts.enriched}</div><div class="label">Enriched</div></div>
                <div class="stat-card approved"><div class="number">${counts.approved}</div><div class="label">On Map</div></div>
                <div class="stat-card rejected"><div class="number">${counts.rejected}</div><div class="label">Rejected</div></div>
            `;
        }

        // ── Filters ──
        function renderFilters() {
            const statuses = ['all', 'pending', 'enriched', 'approved', 'rejected'];
            const statusLabels = {all: 'All', pending: 'Pending', enriched: 'Enriched', approved: 'On Map', rejected: 'Rejected'};
            document.getElementById('filters').innerHTML = statuses.map(s =>
                `<button class="filter-btn ${currentFilter === s ? 'active' : ''}" onclick="setFilter('${s}')">${statusLabels[s]}</button>`
            ).join('');
        }

        function setFilter(f) {
            currentFilter = f;
            renderFilters();
            renderList();
        }

        // ── Render suggestion list ──
        function renderList() {
            const filtered = currentFilter === 'all' ? suggestions : suggestions.filter(s => s.status === currentFilter);
            if (filtered.length === 0) {
                document.getElementById('suggestions-list').innerHTML = `
                    <div class="empty-state"><h2>No suggestions</h2><p>Nothing here with status "${currentFilter}"</p></div>
                `;
                return;
            }
            document.getElementById('suggestions-list').innerHTML = filtered.map(s => renderCard(s)).join('');
        }

        function renderCard(s) {
            const ed = s.enriched_data || {};
            const hasEnriched = Object.keys(ed).length > 0;
            const isNotEvent = ed.is_not_event;
            const isPast = ed.is_past_event;
            const dateStr = new Date(s.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

            let warningHtml = '';
            if (isNotEvent) warningHtml = '<div class="not-event-warning">This URL does not appear to be an event page</div>';
            else if (isPast) warningHtml = '<div class="not-event-warning">This event appears to have already passed</div>';

            // Duplicate detection
            if (s.status !== 'approved' && s.status !== 'rejected' && s.status !== 'merged') {
                const dupes = findDuplicates(ed.name || '');
                if (dupes.length > 0) {
                    const dupeItems = dupes.map(d =>
                        `<div style="margin:4px 0;padding:4px 8px;background:#fbbf2409;border-radius:4px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;">` +
                        `<div><strong>${d.event.name}</strong>` +
                        `<span style="color:#888;font-size:0.75rem;margin-left:8px;">${d.event.dates} · ${d.event.location}</span>` +
                        (d.isSubstring ? `<span style="color:#f87171;font-size:0.7rem;margin-left:6px;">exact match</span>` : '') +
                        `</div>` +
                        `<button class="btn btn-compare" onclick="openCompare(${s.id}, ${d.event.id})">Compare & Update</button>` +
                        `</div>`
                    ).join('');
                    warningHtml += `<div class="dupe-warning"><div class="dupe-header">⚠️ Possible duplicate${dupes.length > 1 ? 's' : ''} already on map:</div>${dupeItems}</div>`;
                }
            }

            return `
            <div class="suggestion-card status-${s.status}" id="card-${s.id}">
                <div class="card-header">
                    <div>
                        <div class="card-meta">
                            <span class="badge badge-${s.status}">${s.status === 'approved' ? 'on map' : s.status}</span>
                            <span class="badge badge-source">${s.source}</span>
                            <span class="card-date">${dateStr}</span>
                            ${s.submitted_by ? `<span class="card-date">by ${s.submitted_by}</span>` : ''}
                        </div>
                        <a class="card-url" href="${s.url}" target="_blank">${s.url}</a>
                    </div>
                </div>
                ${s.notes ? `<p style="color:#888;font-size:0.85rem;margin:8px 0;">Notes: ${s.notes}</p>` : ''}
                ${warningHtml}
                ${hasEnriched || s.status !== 'pending' ? renderEnrichedForm(s) : `
                    <p style="color:#666;font-size:0.85rem;margin:12px 0;">No enrichment data yet. Click "Manual Enrich" to fill in details, or wait for auto-enrichment via Make.com.</p>
                `}
                ${renderActions(s)}
            </div>`;
        }

        function renderEnrichedForm(s) {
            const ed = s.enriched_data || {};
            const tags = ed.tags || [];
            return `
            <div class="enriched-preview">
                <h3>${ed.name || '(untitled)'}</h3>
                <div class="enriched-fields">
                    <div class="enriched-field">
                        <label>Event Name</label>
                        <input type="text" value="${esc(ed.name || '')}" onchange="updateField(${s.id}, 'name', this.value)">
                    </div>
                    <div class="enriched-field">
                        <label>Dates (e.g. "Jun 18–21")</label>
                        <input type="text" value="${esc(ed.dates || '')}" onchange="updateField(${s.id}, 'dates', this.value)">
                    </div>
                    <div class="enriched-field">
                        <label>Month</label>
                        <select onchange="updateField(${s.id}, 'month', this.value)">
                            <option value="">--</option>
                            ${MONTHS.map(m => `<option value="${m}" ${ed.month === m ? 'selected' : ''}>${m}</option>`).join('')}
                        </select>
                    </div>
                    <div class="enriched-field">
                        <label>Location</label>
                        <input type="text" id="loc-${s.id}" value="${esc(ed.location || '')}" onchange="updateField(${s.id}, 'location', this.value)">
                    </div>
                    <div class="enriched-field">
                        <label>Latitude</label>
                        <input type="number" step="0.001" id="lat-${s.id}" value="${ed.lat || ''}" onchange="updateField(${s.id}, 'lat', parseFloat(this.value))">
                    </div>
                    <div class="enriched-field">
                        <label>Longitude</label>
                        <input type="number" step="0.001" id="lng-${s.id}" value="${ed.lng || ''}" onchange="updateField(${s.id}, 'lng', parseFloat(this.value))">
                    </div>
                    <div class="enriched-field full-width" style="display:flex;gap:8px;align-items:center;">
                        <button class="btn btn-geocode" onclick="geocodeLocation(${s.id})">📍 Geocode</button>
                        ${(ed.url || s.url) ? `<a href="${ed.url || s.url}" target="_blank" class="btn btn-visit">🔗 Visit event page</a>` : ''}
                        <span class="geocode-status" id="geo-status-${s.id}"></span>
                    </div>
                    <div class="enriched-field full-width">
                        <label>Description</label>
                        <textarea onchange="updateField(${s.id}, 'description', this.value)">${esc(ed.description || '')}</textarea>
                    </div>
                    <div class="enriched-field full-width">
                        <label>URL (clean)</label>
                        <input type="text" value="${esc(ed.url || s.url || '')}" onchange="updateField(${s.id}, 'url', this.value)">
                    </div>
                    <div class="enriched-field full-width">
                        <label>Tags</label>
                        <div class="tag-select" id="tags-${s.id}">
                            ${ALL_TAGS.map(t => `<span class="tag-chip ${tags.includes(t) ? 'selected' : ''}" onclick="toggleTag(${s.id}, '${t}', this)">${t}</span>`).join('')}
                            ${(tags.filter(t => !ALL_TAGS.includes(t))).map(t => `<span class="tag-chip selected" onclick="toggleTag(${s.id}, '${esc(t)}', this)">${esc(t)}</span>`).join('')}
                        </div>
                        <div class="custom-tag-row">
                            <input type="text" id="new-tag-${s.id}" placeholder="New tag..." onkeydown="if(event.key==='Enter')addCustomTag(${s.id})">
                            <button class="btn-add-tag" onclick="addCustomTag(${s.id})">+ Add</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderActions(s) {
            let btns = '';
            if (s.status === 'pending') {
                btns = `
                    <button class="btn btn-enrich" onclick="manualEnrich(${s.id})">Manual Enrich</button>
                    <button class="btn btn-reject" onclick="updateStatus(${s.id}, 'rejected')">Reject</button>
                `;
            } else if (s.status === 'enriched') {
                btns = `
                    <button class="btn btn-approve" onclick="approveEvent(${s.id})">Approve & Add to Map</button>
                    <button class="btn btn-save" onclick="saveEnrichment(${s.id})">Save Changes</button>
                    <button class="btn btn-reject" onclick="updateStatus(${s.id}, 'rejected')">Reject</button>
                    <button class="btn btn-duplicate" onclick="updateStatus(${s.id}, 'duplicate')">Duplicate</button>
                `;
            } else if (s.status === 'approved') {
                btns = `<span style="color:#4ade80;font-size:0.85rem;">On map</span>`;
            } else if (s.status === 'rejected') {
                btns = `
                    <button class="btn btn-enrich" onclick="updateStatus(${s.id}, 'pending')">Re-open</button>
                `;
            }
            return `<div class="card-actions">${btns}</div>`;
        }

        // ── Field updates (local state) ──
        function updateField(id, field, value) {
            const s = suggestions.find(s => s.id === id);
            if (!s.enriched_data) s.enriched_data = {};
            s.enriched_data[field] = value;
        }

        function toggleTag(id, tag, el) {
            const s = suggestions.find(s => s.id === id);
            if (!s.enriched_data) s.enriched_data = {};
            if (!s.enriched_data.tags) s.enriched_data.tags = [];
            const idx = s.enriched_data.tags.indexOf(tag);
            if (idx > -1) {
                s.enriched_data.tags.splice(idx, 1);
                el.classList.remove('selected');
            } else {
                s.enriched_data.tags.push(tag);
                el.classList.add('selected');
            }
        }

        // ── Manual Enrich (opens form with empty fields) ──
        function manualEnrich(id) {
            const s = suggestions.find(s => s.id === id);
            if (!s.enriched_data) s.enriched_data = {};
            s.status = 'enriched';
            // Save to Supabase
            sb.from('suggestions').update({ status: 'enriched', enriched_data: s.enriched_data, enriched_at: new Date().toISOString() }).eq('id', id).then(({ error }) => {
                if (error) toast('Error: ' + error.message, true);
                else { toast('Ready for enrichment'); renderList(); renderStats(); renderFilters(); }
            });
        }

        // ── Save enrichment data ──
        async function saveEnrichment(id) {
            const s = suggestions.find(s => s.id === id);
            const { error } = await sb.from('suggestions').update({
                enriched_data: s.enriched_data,
                enriched_at: new Date().toISOString()
            }).eq('id', id);
            if (error) toast('Error saving: ' + error.message, true);
            else toast('Enrichment saved');
        }

        // ── Update status ──
        async function updateStatus(id, status) {
            const { error } = await sb.from('suggestions').update({ status }).eq('id', id);
            if (error) { toast('Error: ' + error.message, true); return; }
            const s = suggestions.find(s => s.id === id);
            s.status = status;
            toast(`Marked as ${status}`);
            renderList(); renderStats(); renderFilters();
        }

        // ── Approve: promote to events table ──
        async function approveEvent(id) {
            const s = suggestions.find(s => s.id === id);
            const ed = s.enriched_data || {};

            // Validate required fields
            if (!ed.name || !ed.dates || !ed.month || !ed.lat || !ed.lng || !ed.location) {
                toast('Fill in name, dates, month, lat, lng, and location before approving', true);
                return;
            }

            // Insert into events table
            const newEvent = {
                name: ed.name,
                dates: ed.dates,
                month: ed.month,
                lat: ed.lat,
                lng: ed.lng,
                location: ed.location,
                venue: ed.venue || null,
                description: ed.description || '',
                tags: ed.tags || [],
                url: (ed.url || s.url || '').replace(/^https?:\/\//, ''),
                image_url: ed.image_url || '',
                created_by: s.submitted_by || 'suggestion'
            };

            const { data, error } = await sb.from('events').insert(newEvent).select();
            if (error) { toast('Error adding event: ' + error.message, true); return; }

            // Update suggestion status
            await sb.from('suggestions').update({ status: 'approved' }).eq('id', id);
            s.status = 'approved';
            toast(`"${ed.name}" added to the map!`);
            renderList(); renderStats(); renderFilters();
        }

        // ── Geocode ──
        async function nominatimSearch(q) {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=3`, {
                headers: { 'User-Agent': 'RegenEventsMap/1.0' }
            });
            return resp.json();
        }

        async function geocodeLocation(id) {
            const s = suggestions.find(s => s.id === id);
            const locInput = document.getElementById(`loc-${id}`);
            const latInput = document.getElementById(`lat-${id}`);
            const lngInput = document.getElementById(`lng-${id}`);
            const status = document.getElementById(`geo-status-${id}`);
            const query = locInput.value.trim();

            if (!query) { toast('Enter a location first', true); return; }

            status.textContent = 'Looking up…';
            status.style.color = '#888';

            try {
                // Try the full query first
                let results = await nominatimSearch(query);

                // If no results, try progressively simpler queries
                if (results.length === 0) {
                    // Strip building/venue name — try from first number onward
                    const addrMatch = query.match(/(\d+\s+.+)/);
                    if (addrMatch) {
                        status.textContent = 'Retrying with street address…';
                        results = await nominatimSearch(addrMatch[1]);
                    }
                }
                if (results.length === 0) {
                    // Try just city, state, country (last 2-3 comma parts)
                    const parts = query.split(',').map(p => p.trim());
                    if (parts.length >= 2) {
                        const cityQuery = parts.slice(-2).join(', ');
                        status.textContent = 'Retrying with city…';
                        results = await nominatimSearch(cityQuery);
                    }
                }

                if (results.length === 0) {
                    status.textContent = '❌ No results — try editing the location to a street address or city';
                    status.style.color = '#f87171';
                    return;
                }

                const best = results[0];
                const lat = parseFloat(best.lat);
                const lng = parseFloat(best.lon);

                latInput.value = lat.toFixed(4);
                lngInput.value = lng.toFixed(4);
                updateField(id, 'lat', lat);
                updateField(id, 'lng', lng);

                status.innerHTML = `✅ ${best.display_name.substring(0, 60)}… <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" style="color:#60a5fa;font-size:0.7rem;">verify on map</a>`;
                status.style.color = '#4ade80';

                // If there were multiple results, show alternatives
                if (results.length > 1) {
                    const alts = results.slice(1).map((r, i) =>
                        `<span class="geocode-alt" onclick="applyGeocode(${id}, ${r.lat}, ${r.lon})" style="cursor:pointer;color:#60a5fa;text-decoration:underline;font-size:0.7rem;margin-left:8px;" title="${r.display_name}">alt ${i+2}</span>`
                    ).join('');
                    status.innerHTML += ` ${alts}`;
                }
            } catch (e) {
                status.textContent = '❌ Geocoding failed: ' + e.message;
                status.style.color = '#f87171';
            }
        }

        function applyGeocode(id, lat, lng) {
            const latInput = document.getElementById(`lat-${id}`);
            const lngInput = document.getElementById(`lng-${id}`);
            latInput.value = parseFloat(lat).toFixed(4);
            lngInput.value = parseFloat(lng).toFixed(4);
            updateField(id, 'lat', parseFloat(lat));
            updateField(id, 'lng', parseFloat(lng));
            const status = document.getElementById(`geo-status-${id}`);
            status.innerHTML = `✅ Updated <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" style="color:#60a5fa;font-size:0.7rem;">verify on map</a>`;
            status.style.color = '#4ade80';
        }

        // ── Custom tag ──
        function addCustomTag(id) {
            const input = document.getElementById(`new-tag-${id}`);
            const tag = input.value.trim().toLowerCase();
            if (!tag) return;
            const s = suggestions.find(s => s.id === id);
            if (!s.enriched_data) s.enriched_data = {};
            if (!s.enriched_data.tags) s.enriched_data.tags = [];
            if (s.enriched_data.tags.includes(tag)) { input.value = ''; return; }
            s.enriched_data.tags.push(tag);
            if (!ALL_TAGS.includes(tag)) { ALL_TAGS.push(tag); ALL_TAGS.sort(); ensureTagIcon(tag); }
            input.value = '';
            // Re-render the tag select for this card
            const tagContainer = document.getElementById(`tags-${id}`);
            if (tagContainer) {
                const tags = s.enriched_data.tags;
                const allKnown = ALL_TAGS;
                tagContainer.innerHTML =
                    allKnown.map(t => `<span class="tag-chip ${tags.includes(t) ? 'selected' : ''}" onclick="toggleTag(${id}, '${t}', this)">${t}</span>`).join('') +
                    tags.filter(t => !allKnown.includes(t)).map(t => `<span class="tag-chip selected" onclick="toggleTag(${id}, '${esc(t)}', this)">${esc(t)}</span>`).join('');
            }
        }

        // ── Tab switching ──
        let currentTab = 'suggestions';
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-suggestions').classList.toggle('active', tab === 'suggestions');
            document.getElementById('tab-events').classList.toggle('active', tab === 'events');
            document.getElementById('suggestions-tab').style.display = tab === 'suggestions' ? '' : 'none';
            document.getElementById('events-tab').style.display = tab === 'events' ? '' : 'none';
            if (tab === 'events') {
                loadAllEvents();
            }
        }

        let activeTagFilter = null;

            const query = (document.getElementById('events-search').value || '').toLowerCase();
            let filtered = allEvents;
            if (query) {
                filtered = filtered.filter(ev =>
                    (ev.name || '').toLowerCase().includes(query) ||
                    (ev.location || '').toLowerCase().includes(query) ||
                    (ev.tags || []).some(t => t.toLowerCase().includes(query))
                );

            if (activeTagFilter) {
                filtered = filtered.filter(ev => (ev.tags || []).includes(activeTagFilter));
            }
            renderTagFilterBar();
            renderBulkBar();
            document.getElementById('event-count').textContent = `${filtered.length} of ${allEvents.length} events`;

        function renderTagFilterBar() {

            allEvents.forEach(ev => (ev.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));

            bar.innerHTML = '<span class="label">Filter:</span>' +
                `<span class="tag-filter-chip ${!activeTagFilter ? 'active' : ''}" onclick="setTagFilter(null)">All</span>` +
                sortedTags.map(t =>
                    `<span class="tag-filter-chip ${activeTagFilter === t ? 'active' : ''}" onclick="setTagFilter('${t}')">${getTagIcon(t)} ${t} (${tagCounts[t]})</span>`

        function editEvent(id, field, value) {
            if (!eventEdits[id]) eventEdits[id] = {};
            eventEdits[id][field] = value;
            autoSaveEvent(id);
        }

        function toggleEventTag(id, tag, el) {
            const ev = allEvents.find(e => e.id === id);
            if (!ev.tags) ev.tags = [];
            const idx = ev.tags.indexOf(tag);
            if (idx > -1) {
                ev.tags.splice(idx, 1);
                el.classList.remove('selected');
            } else {
                ev.tags.push(tag);
                el.classList.add('selected');
            }
            if (!eventEdits[id]) eventEdits[id] = {};
            eventEdits[id].tags = [...ev.tags];
            autoSaveEvent(id);
        }

        function addEventCustomTag(id) {
            const input = document.getElementById(`ev-new-tag-${id}`);
            const tag = input.value.trim().toLowerCase();
            if (!tag) return;
            const ev = allEvents.find(e => e.id === id);
            if (!ev.tags) ev.tags = [];
            if (ev.tags.includes(tag)) { input.value = ''; return; }
            ev.tags.push(tag);
            if (!ALL_TAGS.includes(tag)) { ALL_TAGS.push(tag); ALL_TAGS.sort(); ensureTagIcon(tag); }
            if (!eventEdits[id]) eventEdits[id] = {};
            eventEdits[id].tags = [...ev.tags];
            input.value = '';
            // Re-render tags
            const tagContainer = document.getElementById(`ev-tags-${id}`);
            if (tagContainer) {
                tagContainer.innerHTML =
                    ALL_TAGS.map(t => `<span class="tag-chip ${ev.tags.includes(t) ? 'selected' : ''}" onclick="toggleEventTag(${id}, '${t}', this)">${t}</span>`).join('') +
                    ev.tags.filter(t => !ALL_TAGS.includes(t)).map(t => `<span class="tag-chip selected" onclick="toggleEventTag(${id}, '${esc(t)}', this)">${esc(t)}</span>`).join('');
            }
            autoSaveEvent(id);
        }

        // Auto-save with debounce so rapid edits don't spam the API
        const autoSaveTimers = {};
        function autoSaveEvent(id) {
            if (autoSaveTimers[id]) clearTimeout(autoSaveTimers[id]);
            autoSaveTimers[id] = setTimeout(() => saveEventChanges(id), 800);
        }

        async function saveEventChanges(id) {
            if (autoSaveTimers[id]) { clearTimeout(autoSaveTimers[id]); delete autoSaveTimers[id]; }
            const edits = eventEdits[id];
            if (!edits || Object.keys(edits).length === 0) return;
            const { error } = await sb.from('events').update(edits).eq('id', id);
            if (error) { toast('Error saving: ' + error.message, true); return; }
            // Update local data
            const ev = allEvents.find(e => e.id === id);
            Object.assign(ev, edits);
            delete eventEdits[id];
            toast(`Saved`);
        }

        function confirmDeleteEvent(id, name) {
            if (!confirm(`Delete "${name}" (id ${id}) from the map? This cannot be undone.`)) return;
            deleteEvent(id);
        }

        async function deleteEvent(id) {
            const ev = allEvents.find(e => e.id === id);
            const { error } = await sb.from('events').delete().eq('id', id);
            if (error) { toast('Error deleting: ' + error.message, true); return; }
            allEvents = allEvents.filter(e => e.id !== id);
            // Also remove from existingEvents cache
            existingEvents = existingEvents.filter(e => e.id !== id);
            toast(`"${ev.name}" deleted from map`);
            renderEventsTab();
            renderStats();
        }

            renderBulkBar();

        function renderBulkBar() {
            const bar = document.getElementById('bulk-bar');
            const count = bulkSelected.size;
            bar.style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('bulk-count').textContent = count;
            const sel = document.getElementById('bulk-tag-select');
            sel.innerHTML = '<option value="">Select tag...</option>' +

            bulkSelected.clear();

        async function bulkAddTag() {
            const tag = document.getElementById('bulk-tag-select').value;
            if (!tag) { toast('Select a tag first', true); return; }
            const ids = Array.from(bulkSelected);
            let count = 0;
            for (const id of ids) {
                const ev = allEvents.find(e => e.id === id);
                if (!ev.tags) ev.tags = [];
                if (ev.tags.includes(tag)) continue;
                ev.tags.push(tag);
                const { error } = await sb.from('events').update({ tags: ev.tags }).eq('id', id);
                if (error) { toast(`Error on event ${id}: ${error.message}`, true); return; }
                count++;
            }
            toast(`Added "${tag}" to ${count} event${count !== 1 ? 's' : ''}`);
            bulkSelected.clear();
            renderEventsTab();
        }

        async function bulkRemoveTag() {
            const tag = document.getElementById('bulk-tag-select').value;
            if (!tag) { toast('Select a tag first', true); return; }
            const ids = Array.from(bulkSelected);
            let count = 0;
            for (const id of ids) {
                const ev = allEvents.find(e => e.id === id);
                if (!ev.tags || !ev.tags.includes(tag)) continue;
                ev.tags = ev.tags.filter(t => t !== tag);
                const { error } = await sb.from('events').update({ tags: ev.tags }).eq('id', id);
                if (error) { toast(`Error on event ${id}: ${error.message}`, true); return; }
                count++;
            }
            toast(`Removed "${tag}" from ${count} event${count !== 1 ? 's' : ''}`);
            bulkSelected.clear();
            renderEventsTab();
        }

        // ── Tag rename ──
        async function renameTag() {
            const fromTag = document.getElementById('rename-tag-from').value;
            const toTag = document.getElementById('rename-tag-to').value.trim().toLowerCase();
            if (!fromTag) { toast('Select a tag to rename', true); return; }
            if (!toTag) { toast('Enter a new name', true); return; }
            if (fromTag === toTag) { toast('Names are the same', true); return; }
            if (!confirm(`Rename "${fromTag}" to "${toTag}" across all events?`)) return;

            const affected = allEvents.filter(ev => (ev.tags || []).includes(fromTag));
            let count = 0;
            for (const ev of affected) {
                const newTags = ev.tags.map(t => t === fromTag ? toTag : t);
                // Deduplicate in case toTag already existed
                const dedupedTags = [...new Set(newTags)];
                const { error } = await sb.from('events').update({ tags: dedupedTags }).eq('id', ev.id);
                if (error) { toast(`Error on event ${ev.id}: ${error.message}`, true); return; }
                ev.tags = dedupedTags;
                count++;
            }

            // Update ALL_TAGS
            rebuildAllTags(allEvents);
            // Update tag icons if the old tag had one
            if (TAG_ICONS[fromTag] && !TAG_ICONS[toTag]) {
                TAG_ICONS[toTag] = TAG_ICONS[fromTag];
                delete TAG_ICONS[fromTag];
                await saveTagIcon(toTag, TAG_ICONS[toTag]);
                await sb.from('tag_icons').delete().eq('tag', fromTag);
            }

            toast(`Renamed "${fromTag}" to "${toTag}" on ${count} event${count !== 1 ? 's' : ''}`);
            closeTagManager();
            renderEventsTab();
        }

        // ── Delete tag globally ──
        async function deleteTagGlobally() {
            const tag = document.getElementById('delete-tag-select').value;
            if (!tag) { toast('Select a tag first', true); return; }
            const affected = allEvents.filter(ev => (ev.tags || []).includes(tag));
            if (!confirm(`Remove "${tag}" from ${affected.length} event${affected.length !== 1 ? 's' : ''}? This cannot be undone.`)) return;

            let count = 0;
            for (const ev of affected) {
                ev.tags = (ev.tags || []).filter(t => t !== tag);
                const { error } = await sb.from('events').update({ tags: ev.tags }).eq('id', ev.id);
                if (error) { toast(`Error on event ${ev.id}: ${error.message}`, true); return; }
                count++;
            }

            // Remove icon from DB
            await sb.from('tag_icons').delete().eq('tag', tag);
            delete TAG_ICONS[tag];

            rebuildAllTags(allEvents);
            toast(`Removed "${tag}" from ${count} event${count !== 1 ? 's' : ''}`);
            closeTagManager();
            renderEventsTab();
        }

        let TAG_ICONS = {};

        async function loadTagIcons() {
            const { data, error } = await sb.from('tag_icons').select('tag, icon');

        async function ensureTagIcon(tag) {
            if (TAG_ICONS[tag]) return; // already has a DB icon
            const icon = getTagIcon(tag); // will use SMART_DEFAULTS or fall back to 📍
            TAG_ICONS[tag] = icon;
            await saveTagIcon(tag, icon);
        }

        async function saveTagIcon(tag, icon) {
            const { error } = await sb.from('tag_icons').upsert(
                { tag, icon, updated_at: new Date().toISOString() },
                { onConflict: 'tag' }
            );
            if (error) { toast('Error saving icon: ' + error.message, true); }
        }

        function getTagIcon(tag) {
            if (TAG_ICONS[tag]) return TAG_ICONS[tag];
            if (DEFAULT_ICONS[tag]) return DEFAULT_ICONS[tag];
            // Try smart matching
            const lower = tag.toLowerCase();
            for (const [key, icon] of Object.entries(SMART_DEFAULTS)) {
                if (lower.includes(key)) return icon;
            }
            return '📍';
        }

        // ── Helpers ──
        function esc(str) {
            return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Compare & Update (merge) ──
        let mergeSelections = {}; // { fieldName: 'existing' | 'suggestion' }

        async function openCompare(suggestionId, eventId) {
            const s = suggestions.find(s => s.id === suggestionId);
            const ed = s.enriched_data || {};

            // Fetch full event data from Supabase
            const { data: ev, error } = await sb.from('events').select('*').eq('id', eventId).single();
            if (error || !ev) { toast('Error loading event: ' + (error?.message || 'not found'), true); return; }

            mergeSelections = {};
            const fields = [
                { key: 'name', label: 'Name' },
                { key: 'dates', label: 'Dates' },
                { key: 'month', label: 'Month' },
                { key: 'location', label: 'Location' },
                { key: 'lat', label: 'Latitude' },
                { key: 'lng', label: 'Longitude' },
                { key: 'description', label: 'Description' },
                { key: 'url', label: 'URL' },
                { key: 'tags', label: 'Tags' },
            ];

            let rowsHtml = '';
            let hasDiffs = false;
            fields.forEach(f => {
                const evVal = f.key === 'tags' ? (ev[f.key] || []).sort().join(', ') : String(ev[f.key] || '');
                const sugVal = f.key === 'tags' ? (ed[f.key] || []).sort().join(', ') : String(ed[f.key] || '');
                const isSame = evVal === sugVal || (!evVal && !sugVal);

                if (isSame) {
                    // Same value — show grayed out, auto-select existing
                    mergeSelections[f.key] = 'existing';
                    rowsHtml += `
                        <div class="merge-row">
                            <div class="merge-label">${f.key === 'lat' || f.key === 'lng' ? f.label : f.label}</div>
                            <div class="merge-option same" title="Both values are the same">
                                <span class="source-tag">Same</span>${esc(evVal || '(empty)')}</div>
                            <div class="merge-option same">
                                <span class="source-tag">Same</span>${esc(sugVal || '(empty)')}</div>
                        </div>`;
                } else {
                    hasDiffs = true;
                    // Default to suggestion value if it's non-empty, otherwise existing
                    const defaultPick = sugVal ? 'suggestion' : 'existing';
                    mergeSelections[f.key] = defaultPick;
                    rowsHtml += `
                        <div class="merge-row">
                            <div class="merge-label">${f.label}</div>
                            <div class="merge-option ${defaultPick === 'existing' ? 'selected' : ''}"
                                 onclick="pickMerge('${f.key}', 'existing', this)" id="merge-${f.key}-existing">
                                <span class="source-tag">On map</span>${esc(evVal || '(empty)')}</div>
                            <div class="merge-option ${defaultPick === 'suggestion' ? 'selected' : ''}"
                                 onclick="pickMerge('${f.key}', 'suggestion', this)" id="merge-${f.key}-suggestion">
                                <span class="source-tag">Incoming</span>${esc(sugVal || '(empty)')}</div>
                        </div>`;
                }
            });

            if (!hasDiffs) {
                toast('No differences found — data is identical', false);
                return;
            }

            const modalHtml = `
                <div class="merge-overlay" id="merge-overlay" onclick="if(event.target===this)closeMerge()">
                    <div class="merge-modal">
                        <h3>Compare & Update: ${esc(ev.name)}</h3>
                        <p style="color:#888;font-size:0.8rem;margin-bottom:16px;">Click a value to select it. Differing fields are highlighted — pick the best version for each.</p>
                        <div style="display:grid;grid-template-columns:100px 1fr 1fr;gap:8px;margin-bottom:8px;">
                            <div></div>
                            <div style="font-size:0.7rem;color:#4ade80;text-transform:uppercase;font-weight:600;">Currently on Map</div>
                            <div style="font-size:0.7rem;color:#f59e0b;text-transform:uppercase;font-weight:600;">Incoming Suggestion</div>
                        </div>
                        ${rowsHtml}
                        <div class="merge-actions">
                            <button class="btn btn-cancel" onclick="closeMerge()">Cancel</button>
                            <button class="btn btn-merge" onclick="executeMerge(${eventId}, ${suggestionId})">Update Map Event</button>
                        </div>
                    </div>
                </div>`;

            // Insert modal into DOM
            const div = document.createElement('div');
            div.id = 'merge-container';
            div.innerHTML = modalHtml;
            document.body.appendChild(div);
        }

        function pickMerge(field, source, el) {
            // Don't allow picking "same" fields
            if (el.classList.contains('same')) return;
            mergeSelections[field] = source;
            // Update visual state
            const existingEl = document.getElementById(`merge-${field}-existing`);
            const suggestionEl = document.getElementById(`merge-${field}-suggestion`);
            if (existingEl) existingEl.classList.toggle('selected', source === 'existing');
            if (suggestionEl) suggestionEl.classList.toggle('selected', source === 'suggestion');
        }

        function closeMerge() {
            const container = document.getElementById('merge-container');
            if (container) container.remove();
        }

        async function executeMerge(eventId, suggestionId) {
            const s = suggestions.find(s => s.id === suggestionId);
            const ed = s.enriched_data || {};

            // Fetch current event to get existing values
            const { data: ev, error: fetchErr } = await sb.from('events').select('*').eq('id', eventId).single();
            if (fetchErr || !ev) { toast('Error loading event', true); return; }

            // Build update object from selections
            const update = {};
            const fields = ['name','dates','month','location','lat','lng','description','url','tags'];
            fields.forEach(f => {
                if (mergeSelections[f] === 'suggestion') {
                    let sugVal = ed[f];
                    if (f === 'url') sugVal = (sugVal || s.url || '').replace(/^https?:\/\//, '');
                    if (sugVal !== undefined && sugVal !== null && sugVal !== '') {
                        update[f] = sugVal;
                    }
                }
            });

            if (Object.keys(update).length === 0) {
                toast('No changes selected — keeping existing data');
                closeMerge();
                return;
            }

            // Update the event
            const { error: updateErr } = await sb.from('events').update(update).eq('id', eventId);
            if (updateErr) { toast('Error updating event: ' + updateErr.message, true); return; }

            // Mark suggestion as merged
            await sb.from('suggestions').update({ status: 'merged' }).eq('id', suggestionId);
            s.status = 'merged';

            // Update local existingEvents cache
            const evIdx = existingEvents.findIndex(e => e.id === eventId);
            if (evIdx >= 0) Object.assign(existingEvents[evIdx], update);

            closeMerge();
            toast(`Updated "${ev.name}" with ${Object.keys(update).length} field(s)`);
            renderList(); renderStats(); renderFilters();
        }

        // ── Init ──
        // Check for existing Supabase session (persists across page reloads via localStorage)
        // (must be after sb client is created so loadSuggestions() works)
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) showApp();
        });
    </script>
</body>
</html>
