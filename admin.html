<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Admin — Review Suggestions</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 24px;
        }
        /* Auth gate */
        #auth-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 16px;
        }
        #auth-gate h2 { color: #4ade80; font-size: 1.3rem; }
        #auth-gate input {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 16px;
            color: #e0e0e0;
            font-size: 1rem;
            width: 280px;
            text-align: center;
        }
        #auth-gate input:focus { outline: none; border-color: #4ade80; }
        #auth-gate button {
            padding: 10px 32px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        #auth-gate .error-msg { color: #f87171; font-size: 0.85rem; display: none; }
        #app-content { display: none; }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #4ade80;
        }
        .subtitle {
            color: #888;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 20px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4ade80;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card.enriched .number { color: #60a5fa; }
        .stat-card.approved .number { color: #a78bfa; }
        .stat-card.rejected .number { color: #f87171; }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #ccc;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: #4ade80; color: #4ade80; }
        .filter-btn.active { background: #4ade80; color: #000; border-color: #4ade80; font-weight: 600; }

        .suggestion-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .suggestion-card:hover { border-color: #555; }
        .suggestion-card.status-enriched { border-left: 3px solid #60a5fa; }
        .suggestion-card.status-pending { border-left: 3px solid #fbbf24; }
        .suggestion-card.status-approved { border-left: 3px solid #4ade80; }
        .suggestion-card.status-rejected { border-left: 3px solid #f87171; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .card-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-pending { background: #fbbf2433; color: #fbbf24; }
        .badge-enriched { background: #60a5fa33; color: #60a5fa; }
        .badge-approved { background: #4ade8033; color: #4ade80; }
        .badge-rejected { background: #f8717133; color: #f87171; }
        .badge-source { background: #333; color: #aaa; }

        .card-url {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .card-url:hover { text-decoration: underline; }

        .card-date {
            color: #666;
            font-size: 0.8rem;
        }

        .enriched-preview {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
        }
        .enriched-preview h3 {
            color: #4ade80;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .enriched-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .enriched-field label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .enriched-field input,
        .enriched-field textarea,
        .enriched-field select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 10px;
            color: #e0e0e0;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .enriched-field textarea { resize: vertical; min-height: 60px; }
        .enriched-field input:focus,
        .enriched-field textarea:focus {
            outline: none;
            border-color: #4ade80;
        }
        .enriched-field.full-width { grid-column: 1 / -1; }

        .tag-select {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .tag-chip {
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tag-chip:hover { border-color: #4ade80; }
        .tag-chip.selected { background: #4ade8033; color: #4ade80; border-color: #4ade80; }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-approve { background: #4ade80; color: #000; }
        .btn-approve:hover { background: #22c55e; }
        .btn-reject { background: #333; color: #f87171; border: 1px solid #f8717144; }
        .btn-reject:hover { background: #f8717122; }
        .btn-duplicate { background: #333; color: #fbbf24; border: 1px solid #fbbf2444; }
        .btn-duplicate:hover { background: #fbbf2422; }
        .btn-enrich { background: #60a5fa33; color: #60a5fa; border: 1px solid #60a5fa44; }
        .btn-enrich:hover { background: #60a5fa44; }
        .btn-save { background: #333; color: #ccc; }
        .btn-save:hover { background: #444; }
        .btn-geocode { background: #2a9d8f33; color: #2a9d8f; border: 1px solid #2a9d8f44; padding: 6px 14px; font-size: 0.8rem; }
        .btn-geocode:hover { background: #2a9d8f44; }
        .btn-visit { background: #333; color: #60a5fa; border: 1px solid #60a5fa44; padding: 6px 14px; font-size: 0.8rem; text-decoration: none; display: inline-block; }
        .btn-visit:hover { background: #60a5fa22; }
        .geocode-status { font-size: 0.75rem; color: #888; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 8px;
            background: #4ade80;
            color: #000;
            font-weight: 600;
            font-size: 0.9rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #f87171; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #666; }

        .not-event-warning {
            background: #fbbf2411;
            border: 1px solid #fbbf2433;
            border-radius: 6px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 0.8rem;
            color: #fbbf24;
        }
        .dupe-warning {
            background: #f8717111;
            border: 1px solid #f8717133;
            border-radius: 6px;
            padding: 10px 12px;
            margin: 8px 0;
            font-size: 0.8rem;
            color: #f87171;
        }
        .dupe-header {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .dupe-warning strong {
            color: #e0e0e0;
            font-size: 0.85rem;
        }
        .btn-compare { background: #f59e0b33; color: #f59e0b; border: 1px solid #f59e0b44; padding: 4px 10px; font-size: 0.75rem; margin-left: 8px; }
        .btn-compare:hover { background: #f59e0b44; }
        .badge-merged { background: #f59e0b33; color: #f59e0b; }
        .stat-card.merged .number { color: #f59e0b; }
        .suggestion-card.status-merged { border-left: 3px solid #f59e0b; }

        /* Compare & Update modal */
        .merge-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .merge-modal {
            background: #1a1a1a; border: 1px solid #444; border-radius: 12px;
            padding: 24px; max-width: 720px; width: 100%; max-height: 85vh;
            overflow-y: auto;
        }
        .merge-modal h3 { color: #f59e0b; margin-bottom: 16px; font-size: 1.1rem; }
        .merge-row {
            display: grid; grid-template-columns: 100px 1fr 1fr;
            gap: 8px; margin-bottom: 10px; align-items: start;
        }
        .merge-label {
            font-size: 0.75rem; color: #888; text-transform: uppercase;
            letter-spacing: 0.5px; padding-top: 8px;
        }
        .merge-option {
            padding: 8px 12px; border-radius: 6px; border: 2px solid #333;
            background: #111; font-size: 0.85rem; color: #ccc;
            cursor: pointer; transition: all 0.15s; min-height: 36px;
            word-break: break-word;
        }
        .merge-option:hover { border-color: #666; }
        .merge-option.selected { border-color: #4ade80; background: #4ade8011; color: #e0e0e0; }
        .merge-option.same { border-color: #333; color: #555; cursor: default; font-style: italic; }
        .merge-option .source-tag {
            font-size: 0.65rem; color: #666; text-transform: uppercase;
            display: block; margin-bottom: 2px;
        }
        .merge-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
        .btn-merge { background: #f59e0b; color: #000; font-weight: 600; }
        .btn-merge:hover { background: #d97706; }
        .btn-cancel { background: #333; color: #ccc; }
        .btn-cancel:hover { background: #444; }
    </style>
</head>
<body>
    <!-- Auth Gate -->
    <div id="auth-gate">
        <h2>Events Admin</h2>
        <p style="color:#888;font-size:0.85rem;">Enter the admin passphrase to continue</p>
        <input type="password" id="passphrase-input" placeholder="Passphrase" onkeydown="if(event.key==='Enter')checkAuth()">
        <button onclick="checkAuth()">Unlock</button>
        <p class="error-msg" id="auth-error">Incorrect passphrase</p>
    </div>

    <!-- Main App (hidden until authed) -->
    <div id="app-content">
        <h1>Events Admin</h1>
        <p class="subtitle">Review and approve suggested events for the Regen Events Map</p>

        <div class="stats" id="stats"></div>
        <div class="filter-bar" id="filters"></div>
        <div id="suggestions-list"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ── Auth ──
        // SHA-256 hash of the passphrase (so it's not stored in plaintext in source)
        // Default passphrase: "regenmap2026" — change the hash below if you want a different one
        const PASSPHRASE_HASH = '8f14e45fceea167a5a36dedd4bea2543'; // md5 of regenmap2026

        // Simple hash function (not crypto-grade, just a gate)
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return hash.toString(36);
        }

        function checkAuth() {
            const input = document.getElementById('passphrase-input').value;
            // Check against known passphrase directly (simple approach)
            if (input === 'regenmap2026') {
                sessionStorage.setItem('admin_auth', 'true');
                showApp();
            } else {
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('passphrase-input').value = '';
                document.getElementById('passphrase-input').focus();
            }
        }

        function showApp() {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            loadSuggestions();
        }

        const SUPABASE_URL = 'https://aurftdjjghtzeofqzezx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1cmZ0ZGpqZ2h0emVvZnF6ZXp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4MzUsImV4cCI6MjA4OTU2NjgzNX0.PeOisRNczOCYOgyiKL8lNDA0ZNiwhzBhqQWDYx6DtMo';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ALL_TAGS = [
            'regen','bioregional','ecovillage','permaculture','commons','climate',
            'systems change','governance','web3','transformation','festival',
            'gathering','retreat','impact','futures','regen ag','regen economics',
            'healing','wellbeing','craft','primitive skills','rewilding',
            'cultural','food systems','entrepreneurship','hacker camp','burning man','UPgame'
        ].sort();

        const MONTHS = ['Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        let suggestions = [];
        let existingEvents = [];
        let currentFilter = 'all';

        // ── Toast ──
        function toast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => el.className = 'toast', 3000);
        }

        // ── Load suggestions + existing events ──
        async function loadSuggestions() {
            const [sugResult, evResult] = await Promise.all([
                sb.from('suggestions').select('*').order('created_at', { ascending: false }),
                sb.from('events').select('id,name,dates,month,location')
            ]);
            if (sugResult.error) { toast('Error loading suggestions: ' + sugResult.error.message, true); return; }
            if (evResult.error) { toast('Error loading events: ' + evResult.error.message, true); return; }
            suggestions = sugResult.data;
            existingEvents = evResult.data || [];
            renderStats();
            renderFilters();
            renderList();
        }

        // ── Duplicate detection ──
        function normalizeForMatch(str) {
            return (str || '').toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getKeywords(str) {
            const stopWords = new Set(['the','a','an','of','for','and','in','at','to','by','on','is','it','with','from','as','or','be','are','was','this','that','2026','2025']);
            return normalizeForMatch(str)
                .split(' ')
                .filter(w => w.length > 2 && !stopWords.has(w));
        }

        function findDuplicates(suggestionName) {
            if (!suggestionName) return [];
            const sugKeywords = getKeywords(suggestionName);
            if (sugKeywords.length === 0) return [];

            const matches = [];
            existingEvents.forEach(ev => {
                const evKeywords = getKeywords(ev.name);
                if (evKeywords.length === 0) return;

                // Count shared keywords
                const shared = sugKeywords.filter(k => evKeywords.some(ek => ek.includes(k) || k.includes(ek)));
                const score = shared.length / Math.min(sugKeywords.length, evKeywords.length);

                // Also check if one name contains the other (substring match)
                const normSug = normalizeForMatch(suggestionName);
                const normEv = normalizeForMatch(ev.name);
                const isSubstring = normSug.includes(normEv) || normEv.includes(normSug);

                // Require either: substring match, or 2+ shared keywords with high score
                const commonWords = new Set(['festival','gathering','conference','summit','week','camp','retreat','congress','convergence','day','days']);
                const meaningfulShared = shared.filter(w => !commonWords.has(w));
                const isGoodMatch = (score >= 0.6 && shared.length >= 2 && meaningfulShared.length >= 1) || isSubstring;

                if (isGoodMatch) {
                    matches.push({ event: ev, score, shared, isSubstring });
                }
            });

            return matches.sort((a, b) => b.score - a.score);
        }

        // ── Stats ──
        function renderStats() {
            const counts = { pending: 0, enriched: 0, approved: 0, rejected: 0 };
            suggestions.forEach(s => { if (counts[s.status] !== undefined) counts[s.status]++; });
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="number">${suggestions.length}</div><div class="label">Total</div></div>
                <div class="stat-card"><div class="number">${counts.pending}</div><div class="label">Pending</div></div>
                <div class="stat-card enriched"><div class="number">${counts.enriched}</div><div class="label">Enriched</div></div>
                <div class="stat-card approved"><div class="number">${counts.approved}</div><div class="label">On Map</div></div>
                <div class="stat-card rejected"><div class="number">${counts.rejected}</div><div class="label">Rejected</div></div>
            `;
        }

        // ── Filters ──
        function renderFilters() {
            const statuses = ['all', 'pending', 'enriched', 'approved', 'rejected'];
            const statusLabels = {all: 'All', pending: 'Pending', enriched: 'Enriched', approved: 'On Map', rejected: 'Rejected'};
            document.getElementById('filters').innerHTML = statuses.map(s =>
                `<button class="filter-btn ${currentFilter === s ? 'active' : ''}" onclick="setFilter('${s}')">${statusLabels[s]}</button>`
            ).join('');
        }

        function setFilter(f) {
            currentFilter = f;
            renderFilters();
            renderList();
        }

        // ── Render suggestion list ──
        function renderList() {
            const filtered = currentFilter === 'all' ? suggestions : suggestions.filter(s => s.status === currentFilter);
            if (filtered.length === 0) {
                document.getElementById('suggestions-list').innerHTML = `
                    <div class="empty-state"><h2>No suggestions</h2><p>Nothing here with status "${currentFilter}"</p></div>
                `;
                return;
            }
            document.getElementById('suggestions-list').innerHTML = filtered.map(s => renderCard(s)).join('');
        }

        function renderCard(s) {
            const ed = s.enriched_data || {};
            const hasEnriched = Object.keys(ed).length > 0;
            const isNotEvent = ed.is_not_event;
            const isPast = ed.is_past_event;
            const dateStr = new Date(s.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

            let warningHtml = '';
            if (isNotEvent) warningHtml = '<div class="not-event-warning">This URL does not appear to be an event page</div>';
            else if (isPast) warningHtml = '<div class="not-event-warning">This event appears to have already passed</div>';

            // Duplicate detection
            if (s.status !== 'approved' && s.status !== 'rejected' && s.status !== 'merged') {
                const dupes = findDuplicates(ed.name || '');
                if (dupes.length > 0) {
                    const dupeItems = dupes.map(d =>
                        `<div style="margin:4px 0;padding:4px 8px;background:#fbbf2409;border-radius:4px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;">` +
                        `<div><strong>${d.event.name}</strong>` +
                        `<span style="color:#888;font-size:0.75rem;margin-left:8px;">${d.event.dates} · ${d.event.location}</span>` +
                        (d.isSubstring ? `<span style="color:#f87171;font-size:0.7rem;margin-left:6px;">exact match</span>` : '') +
                        `</div>` +
                        `<button class="btn btn-compare" onclick="openCompare(${s.id}, ${d.event.id})">Compare & Update</button>` +
                        `</div>`
                    ).join('');
                    warningHtml += `<div class="dupe-warning"><div class="dupe-header">⚠️ Possible duplicate${dupes.length > 1 ? 's' : ''} already on map:</div>${dupeItems}</div>`;
                }
            }

            return `
            <div class="suggestion-card status-${s.status}" id="card-${s.id}">
                <div class="card-header">
                    <div>
                        <div class="card-meta">
                            <span class="badge badge-${s.status}">${s.status === 'approved' ? 'on map' : s.status}</span>
                            <span class="badge badge-source">${s.source}</span>
                            <span class="card-date">${dateStr}</span>
                            ${s.submitted_by ? `<span class="card-date">by ${s.submitted_by}</span>` : ''}
                        </div>
                        <a class="card-url" href="${s.url}" target="_blank">${s.url}</a>
                    </div>
                </div>
                ${s.notes ? `<p style="color:#888;font-size:0.85rem;margin:8px 0;">Notes: ${s.notes}</p>` : ''}
                ${warningHtml}
                ${hasEnriched || s.status !== 'pending' ? renderEnrichedForm(s) : `
                    <p style="color:#666;font-size:0.85rem;margin:12px 0;">No enrichment data yet. Click "Manual Enrich" to fill in details, or wait for auto-enrichment via Make.com.</p>
                `}
                ${renderActions(s)}
            </div>`;
        }

        function renderEnrichedForm(s) {
            const ed = s.enriched_data || {};
            const tags = ed.tags || [];
            return `
            <div class="enriched-preview">
                <h3>${ed.name || '(untitled)'}</h3>
                <div class="enriched-fields">
                    <div class="enriched-field">
                        <label>Event Name</label>
                        <input type="text" value="${esc(ed.name || '')}" onchange="updateField(${s.id}, 'name', this.value)">
                    </div>
                    <div class="enriched-field">
                        <label>Dates (e.g. "Jun 18–21")</label>
                        <input type="text" value="${esc(ed.dates || '')}" onchange="updateField(${s.id}, 'dates', this.value)">
                    </div>
                    <div class="enriched-field">
                        <label>Month</label>
                        <select onchange="updateField(${s.id}, 'month', this.value)">
                            <option value="">--</option>
                            ${MONTHS.map(m => `<option value="${m}" ${ed.month === m ? 'selected' : ''}>${m}</option>`).join('')}
                        </select>
                    </div>
                    <div class="enriched-field">
                        <label>Location</label>
                        <input type="text" id="loc-${s.id}" value="${esc(ed.location || '')}" onchange="updateField(${s.id}, 'location', this.value)">
                    </div>
                    <div class="enriched-field">
                        <label>Latitude</label>
                        <input type="number" step="0.001" id="lat-${s.id}" value="${ed.lat || ''}" onchange="updateField(${s.id}, 'lat', parseFloat(this.value))">
                    </div>
                    <div class="enriched-field">
                        <label>Longitude</label>
                        <input type="number" step="0.001" id="lng-${s.id}" value="${ed.lng || ''}" onchange="updateField(${s.id}, 'lng', parseFloat(this.value))">
                    </div>
                    <div class="enriched-field full-width" style="display:flex;gap:8px;align-items:center;">
                        <button class="btn btn-geocode" onclick="geocodeLocation(${s.id})">📍 Geocode</button>
                        ${(ed.url || s.url) ? `<a href="${ed.url || s.url}" target="_blank" class="btn btn-visit">🔗 Visit event page</a>` : ''}
                        <span class="geocode-status" id="geo-status-${s.id}"></span>
                    </div>
                    <div class="enriched-field full-width">
                        <label>Description</label>
                        <textarea onchange="updateField(${s.id}, 'description', this.value)">${esc(ed.description || '')}</textarea>
                    </div>
                    <div class="enriched-field full-width">
                        <label>URL (clean)</label>
                        <input type="text" value="${esc(ed.url || s.url || '')}" onchange="updateField(${s.id}, 'url', this.value)">
                    </div>
                    <div class="enriched-field full-width">
                        <label>Tags</label>
                        <div class="tag-select">
                            ${ALL_TAGS.map(t => `<span class="tag-chip ${tags.includes(t) ? 'selected' : ''}" onclick="toggleTag(${s.id}, '${t}', this)">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderActions(s) {
            let btns = '';
            if (s.status === 'pending') {
                btns = `
                    <button class="btn btn-enrich" onclick="manualEnrich(${s.id})">Manual Enrich</button>
                    <button class="btn btn-reject" onclick="updateStatus(${s.id}, 'rejected')">Reject</button>
                `;
            } else if (s.status === 'enriched') {
                btns = `
                    <button class="btn btn-approve" onclick="approveEvent(${s.id})">Approve & Add to Map</button>
                    <button class="btn btn-save" onclick="saveEnrichment(${s.id})">Save Changes</button>
                    <button class="btn btn-reject" onclick="updateStatus(${s.id}, 'rejected')">Reject</button>
                    <button class="btn btn-duplicate" onclick="updateStatus(${s.id}, 'duplicate')">Duplicate</button>
                `;
            } else if (s.status === 'approved') {
                btns = `<span style="color:#4ade80;font-size:0.85rem;">On map</span>`;
            } else if (s.status === 'rejected') {
                btns = `
                    <button class="btn btn-enrich" onclick="updateStatus(${s.id}, 'pending')">Re-open</button>
                `;
            }
            return `<div class="card-actions">${btns}</div>`;
        }

        // ── Field updates (local state) ──
        function updateField(id, field, value) {
            const s = suggestions.find(s => s.id === id);
            if (!s.enriched_data) s.enriched_data = {};
            s.enriched_data[field] = value;
        }

        function toggleTag(id, tag, el) {
            const s = suggestions.find(s => s.id === id);
            if (!s.enriched_data) s.enriched_data = {};
            if (!s.enriched_data.tags) s.enriched_data.tags = [];
            const idx = s.enriched_data.tags.indexOf(tag);
            if (idx > -1) {
                s.enriched_data.tags.splice(idx, 1);
                el.classList.remove('selected');
            } else {
                s.enriched_data.tags.push(tag);
                el.classList.add('selected');
            }
        }

        // ── Manual Enrich (opens form with empty fields) ──
        function manualEnrich(id) {
            const s = suggestions.find(s => s.id === id);
            if (!s.enriched_data) s.enriched_data = {};
            s.status = 'enriched';
            // Save to Supabase
            sb.from('suggestions').update({ status: 'enriched', enriched_data: s.enriched_data, enriched_at: new Date().toISOString() }).eq('id', id).then(({ error }) => {
                if (error) toast('Error: ' + error.message, true);
                else { toast('Ready for enrichment'); renderList(); renderStats(); renderFilters(); }
            });
        }

        // ── Save enrichment data ──
        async function saveEnrichment(id) {
            const s = suggestions.find(s => s.id === id);
            const { error } = await sb.from('suggestions').update({
                enriched_data: s.enriched_data,
                enriched_at: new Date().toISOString()
            }).eq('id', id);
            if (error) toast('Error saving: ' + error.message, true);
            else toast('Enrichment saved');
        }

        // ── Update status ──
        async function updateStatus(id, status) {
            const { error } = await sb.from('suggestions').update({ status }).eq('id', id);
            if (error) { toast('Error: ' + error.message, true); return; }
            const s = suggestions.find(s => s.id === id);
            s.status = status;
            toast(`Marked as ${status}`);
            renderList(); renderStats(); renderFilters();
        }

        // ── Approve: promote to events table ──
        async function approveEvent(id) {
            const s = suggestions.find(s => s.id === id);
            const ed = s.enriched_data || {};

            // Validate required fields
            if (!ed.name || !ed.dates || !ed.month || !ed.lat || !ed.lng || !ed.location) {
                toast('Fill in name, dates, month, lat, lng, and location before approving', true);
                return;
            }

            // Insert into events table
            const newEvent = {
                name: ed.name,
                dates: ed.dates,
                month: ed.month,
                lat: ed.lat,
                lng: ed.lng,
                location: ed.location,
                venue: ed.venue || null,
                description: ed.description || '',
                tags: ed.tags || [],
                url: (ed.url || s.url || '').replace(/^https?:\/\//, ''),
                image_url: ed.image_url || '',
                created_by: s.submitted_by || 'suggestion'
            };

            const { data, error } = await sb.from('events').insert(newEvent).select();
            if (error) { toast('Error adding event: ' + error.message, true); return; }

            // Update suggestion status
            await sb.from('suggestions').update({ status: 'approved' }).eq('id', id);
            s.status = 'approved';
            toast(`"${ed.name}" added to the map!`);
            renderList(); renderStats(); renderFilters();
        }

        // ── Geocode ──
        async function nominatimSearch(q) {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=3`, {
                headers: { 'User-Agent': 'RegenEventsMap/1.0' }
            });
            return resp.json();
        }

        async function geocodeLocation(id) {
            const s = suggestions.find(s => s.id === id);
            const locInput = document.getElementById(`loc-${id}`);
            const latInput = document.getElementById(`lat-${id}`);
            const lngInput = document.getElementById(`lng-${id}`);
            const status = document.getElementById(`geo-status-${id}`);
            const query = locInput.value.trim();

            if (!query) { toast('Enter a location first', true); return; }

            status.textContent = 'Looking up…';
            status.style.color = '#888';

            try {
                // Try the full query first
                let results = await nominatimSearch(query);

                // If no results, try progressively simpler queries
                if (results.length === 0) {
                    // Strip building/venue name — try from first number onward
                    const addrMatch = query.match(/(\d+\s+.+)/);
                    if (addrMatch) {
                        status.textContent = 'Retrying with street address…';
                        results = await nominatimSearch(addrMatch[1]);
                    }
                }
                if (results.length === 0) {
                    // Try just city, state, country (last 2-3 comma parts)
                    const parts = query.split(',').map(p => p.trim());
                    if (parts.length >= 2) {
                        const cityQuery = parts.slice(-2).join(', ');
                        status.textContent = 'Retrying with city…';
                        results = await nominatimSearch(cityQuery);
                    }
                }

                if (results.length === 0) {
                    status.textContent = '❌ No results — try editing the location to a street address or city';
                    status.style.color = '#f87171';
                    return;
                }

                const best = results[0];
                const lat = parseFloat(best.lat);
                const lng = parseFloat(best.lon);

                latInput.value = lat.toFixed(4);
                lngInput.value = lng.toFixed(4);
                updateField(id, 'lat', lat);
                updateField(id, 'lng', lng);

                status.innerHTML = `✅ ${best.display_name.substring(0, 60)}… <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" style="color:#60a5fa;font-size:0.7rem;">verify on map</a>`;
                status.style.color = '#4ade80';

                // If there were multiple results, show alternatives
                if (results.length > 1) {
                    const alts = results.slice(1).map((r, i) =>
                        `<span class="geocode-alt" onclick="applyGeocode(${id}, ${r.lat}, ${r.lon})" style="cursor:pointer;color:#60a5fa;text-decoration:underline;font-size:0.7rem;margin-left:8px;" title="${r.display_name}">alt ${i+2}</span>`
                    ).join('');
                    status.innerHTML += ` ${alts}`;
                }
            } catch (e) {
                status.textContent = '❌ Geocoding failed: ' + e.message;
                status.style.color = '#f87171';
            }
        }

        function applyGeocode(id, lat, lng) {
            const latInput = document.getElementById(`lat-${id}`);
            const lngInput = document.getElementById(`lng-${id}`);
            latInput.value = parseFloat(lat).toFixed(4);
            lngInput.value = parseFloat(lng).toFixed(4);
            updateField(id, 'lat', parseFloat(lat));
            updateField(id, 'lng', parseFloat(lng));
            const status = document.getElementById(`geo-status-${id}`);
            status.innerHTML = `✅ Updated <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" style="color:#60a5fa;font-size:0.7rem;">verify on map</a>`;
            status.style.color = '#4ade80';
        }

        // ── Helpers ──
        function esc(str) {
            return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Compare & Update (merge) ──
        let mergeSelections = {}; // { fieldName: 'existing' | 'suggestion' }

        async function openCompare(suggestionId, eventId) {
            const s = suggestions.find(s => s.id === suggestionId);
            const ed = s.enriched_data || {};

            // Fetch full event data from Supabase
            const { data: ev, error } = await sb.from('events').select('*').eq('id', eventId).single();
            if (error || !ev) { toast('Error loading event: ' + (error?.message || 'not found'), true); return; }

            mergeSelections = {};
            const fields = [
                { key: 'name', label: 'Name' },
                { key: 'dates', label: 'Dates' },
                { key: 'month', label: 'Month' },
                { key: 'location', label: 'Location' },
                { key: 'lat', label: 'Latitude' },
                { key: 'lng', label: 'Longitude' },
                { key: 'description', label: 'Description' },
                { key: 'url', label: 'URL' },
                { key: 'tags', label: 'Tags' },
            ];

            let rowsHtml = '';
            let hasDiffs = false;
            fields.forEach(f => {
                const evVal = f.key === 'tags' ? (ev[f.key] || []).sort().join(', ') : String(ev[f.key] || '');
                const sugVal = f.key === 'tags' ? (ed[f.key] || []).sort().join(', ') : String(ed[f.key] || '');
                const isSame = evVal === sugVal || (!evVal && !sugVal);

                if (isSame) {
                    // Same value — show grayed out, auto-select existing
                    mergeSelections[f.key] = 'existing';
                    rowsHtml += `
                        <div class="merge-row">
                            <div class="merge-label">${f.key === 'lat' || f.key === 'lng' ? f.label : f.label}</div>
                            <div class="merge-option same" title="Both values are the same">
                                <span class="source-tag">Same</span>${esc(evVal || '(empty)')}</div>
                            <div class="merge-option same">
                                <span class="source-tag">Same</span>${esc(sugVal || '(empty)')}</div>
                        </div>`;
                } else {
                    hasDiffs = true;
                    // Default to suggestion value if it's non-empty, otherwise existing
                    const defaultPick = sugVal ? 'suggestion' : 'existing';
                    mergeSelections[f.key] = defaultPick;
                    rowsHtml += `
                        <div class="merge-row">
                            <div class="merge-label">${f.label}</div>
                            <div class="merge-option ${defaultPick === 'existing' ? 'selected' : ''}"
                                 onclick="pickMerge('${f.key}', 'existing', this)" id="merge-${f.key}-existing">
                                <span class="source-tag">On map</span>${esc(evVal || '(empty)')}</div>
                            <div class="merge-option ${defaultPick === 'suggestion' ? 'selected' : ''}"
                                 onclick="pickMerge('${f.key}', 'suggestion', this)" id="merge-${f.key}-suggestion">
                                <span class="source-tag">Incoming</span>${esc(sugVal || '(empty)')}</div>
                        </div>`;
                }
            });

            if (!hasDiffs) {
                toast('No differences found — data is identical', false);
                return;
            }

            const modalHtml = `
                <div class="merge-overlay" id="merge-overlay" onclick="if(event.target===this)closeMerge()">
                    <div class="merge-modal">
                        <h3>Compare & Update: ${esc(ev.name)}</h3>
                        <p style="color:#888;font-size:0.8rem;margin-bottom:16px;">Click a value to select it. Differing fields are highlighted — pick the best version for each.</p>
                        <div style="display:grid;grid-template-columns:100px 1fr 1fr;gap:8px;margin-bottom:8px;">
                            <div></div>
                            <div style="font-size:0.7rem;color:#4ade80;text-transform:uppercase;font-weight:600;">Currently on Map</div>
                            <div style="font-size:0.7rem;color:#f59e0b;text-transform:uppercase;font-weight:600;">Incoming Suggestion</div>
                        </div>
                        ${rowsHtml}
                        <div class="merge-actions">
                            <button class="btn btn-cancel" onclick="closeMerge()">Cancel</button>
                            <button class="btn btn-merge" onclick="executeMerge(${eventId}, ${suggestionId})">Update Map Event</button>
                        </div>
                    </div>
                </div>`;

            // Insert modal into DOM
            const div = document.createElement('div');
            div.id = 'merge-container';
            div.innerHTML = modalHtml;
            document.body.appendChild(div);
        }

        function pickMerge(field, source, el) {
            // Don't allow picking "same" fields
            if (el.classList.contains('same')) return;
            mergeSelections[field] = source;
            // Update visual state
            const existingEl = document.getElementById(`merge-${field}-existing`);
            const suggestionEl = document.getElementById(`merge-${field}-suggestion`);
            if (existingEl) existingEl.classList.toggle('selected', source === 'existing');
            if (suggestionEl) suggestionEl.classList.toggle('selected', source === 'suggestion');
        }

        function closeMerge() {
            const container = document.getElementById('merge-container');
            if (container) container.remove();
        }

        async function executeMerge(eventId, suggestionId) {
            const s = suggestions.find(s => s.id === suggestionId);
            const ed = s.enriched_data || {};

            // Fetch current event to get existing values
            const { data: ev, error: fetchErr } = await sb.from('events').select('*').eq('id', eventId).single();
            if (fetchErr || !ev) { toast('Error loading event', true); return; }

            // Build update object from selections
            const update = {};
            const fields = ['name','dates','month','location','lat','lng','description','url','tags'];
            fields.forEach(f => {
                if (mergeSelections[f] === 'suggestion') {
                    let sugVal = ed[f];
                    if (f === 'url') sugVal = (sugVal || s.url || '').replace(/^https?:\/\//, '');
                    if (sugVal !== undefined && sugVal !== null && sugVal !== '') {
                        update[f] = sugVal;
                    }
                }
            });

            if (Object.keys(update).length === 0) {
                toast('No changes selected — keeping existing data');
                closeMerge();
                return;
            }

            // Update the event
            const { error: updateErr } = await sb.from('events').update(update).eq('id', eventId);
            if (updateErr) { toast('Error updating event: ' + updateErr.message, true); return; }

            // Mark suggestion as merged
            await sb.from('suggestions').update({ status: 'merged' }).eq('id', suggestionId);
            s.status = 'merged';

            // Update local existingEvents cache
            const evIdx = existingEvents.findIndex(e => e.id === eventId);
            if (evIdx >= 0) Object.assign(existingEvents[evIdx], update);

            closeMerge();
            toast(`Updated "${ev.name}" with ${Object.keys(update).length} field(s)`);
            renderList(); renderStats(); renderFilters();
        }

        // ── Init ──
        // Auto-unlock if already authed this session
        // (must be after sb client is created so loadSuggestions() works)
        if (sessionStorage.getItem('admin_auth') === 'true') {
            showApp();
        }
    </script>
</body>
</html>
